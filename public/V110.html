<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>你一句，我一句 — 故事接龙 V110</title>
<style>
:root { --bg: #0a0a14; --ai-color: #7c3aed; --user-color: #06b6d4; --text: #e2e8f0; --dim: #94a3b8; --bubble-ai: rgba(124,58,237,0.12); --bubble-user: rgba(6,182,212,0.12); --border-ai: rgba(124,58,237,0.25); --border-user: rgba(6,182,212,0.25); --input-bg: rgba(255,255,255,0.06); --input-border: rgba(255,255,255,0.12); --grad-bottom: var(--bg); --bubble-system: rgba(255,255,255,0.04); }
body.light { --bg: #f0f2f5; --text: #1e293b; --dim: #64748b; --bubble-ai: rgba(124,58,237,0.08); --bubble-user: rgba(6,182,212,0.08); --border-ai: rgba(124,58,237,0.2); --border-user: rgba(6,182,212,0.2); --input-bg: rgba(0,0,0,0.04); --input-border: rgba(0,0,0,0.12); --grad-bottom: #f0f2f5; --bubble-system: rgba(0,0,0,0.04); }
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; transition: background 0.3s, color 0.3s; }
body.light .starfield .star { opacity: 0.4; }
body.light .starfield .nebula-blob { opacity: 0.3; }
.starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.starfield .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--dur) ease-in-out infinite; animation-delay: var(--delay); }
@keyframes twinkle { 0%, 100% { opacity: 0.15; transform: scale(0.8); } 50% { opacity: 0.9; transform: scale(1.3); } }
.starfield .nebula-blob { position: absolute; border-radius: 50%; filter: blur(60px); animation: drift var(--drift) ease-in-out infinite alternate; }
@keyframes drift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(var(--dx), var(--dy)) scale(1.15); } }
.starfield .shooting { position: absolute; width: 80px; height: 1.5px; background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.7) 100%); animation: shoot var(--shoot-dur) linear infinite; animation-delay: var(--shoot-delay); opacity: 0; }
@keyframes shoot { 0% { opacity: 0; transform: translateX(0) translateY(0); } 5% { opacity: 1; } 15% { opacity: 0; transform: translateX(-300px) translateY(80px); } 100% { opacity: 0; transform: translateX(-300px) translateY(80px); } }
.chat-wrap { position: relative; z-index: 10; flex: 1; overflow-y: auto; padding: 4px 16px 110px; display: flex; flex-direction: column; gap: 12px; }
.chat-wrap::-webkit-scrollbar { width: 4px; }
.chat-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.msg { display: flex; gap: 10px; max-width: 88%; animation: fadeUp 0.35s ease-out; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; }
.msg.ai .avatar { background: rgba(124,58,237,0.3); color: #a78bfa; border: 1.5px solid rgba(124,58,237,0.5); }
.msg.user .avatar { background: rgba(6,182,212,0.3); color: #67e8f9; border: 1.5px solid rgba(6,182,212,0.5); }
.msg .bubble { padding: 12px 16px; border-radius: 16px; font-size: 0.9rem; line-height: 1.55; word-break: break-word; transition: background 0.3s, border-color 0.3s; }
.msg.ai .bubble { background: var(--bubble-ai); border: 1px solid var(--border-ai); border-bottom-left-radius: 4px; }
.msg.user .bubble { background: var(--bubble-user); border: 1px solid var(--border-user); border-bottom-right-radius: 4px; }
.msg .bubble .role-tag { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; opacity: 0.7; }
.msg .bubble .char-count { font-size: 0.55rem; color: var(--dim); opacity: 0.5; margin-left: 6px; }
.stream-cursor::after { content: '▍'; display: inline; animation: blink 0.8s infinite; color: var(--ai-color); font-weight: 400; }
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
.msg.system { align-self: center; max-width: 80%; text-align: center; animation: none; }
.msg.system .bubble { background: var(--bubble-system); border: 1px dashed rgba(255,255,255,0.1); border-radius: 12px; font-size: 0.75rem; color: var(--dim); padding: 8px 16px; }
.bottom-panel { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; display: flex; flex-direction: column; background: linear-gradient(transparent, var(--grad-bottom) 30%); }
.input-bar { flex-shrink: 0; padding: 10px 16px; display: flex; gap: 10px; align-items: flex-end; }
.input-bar textarea { flex: 1; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 16px; color: var(--text); padding: 12px 16px; font-size: 0.9rem; resize: vertical; min-height: 44px; line-height: 1.4; outline: none; font-family: inherit; transition: border-color 0.2s; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
.input-bar textarea:focus { border-color: var(--user-color); }
.input-bar textarea::placeholder { color: var(--dim); }
.btn-send { width: 44px; height: 44px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--user-color), var(--ai-color)); color: #fff; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; transition: transform 0.15s, opacity 0.15s; display: flex; align-items: center; justify-content: center; }
.btn-send:active { transform: scale(0.92); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-reset { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: var(--dim); font-size: 0.85rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: color 0.15s, border-color 0.15s; }
.btn-reset:active { color: var(--text); border-color: rgba(255,255,255,0.3); }
.tts-btn { position: relative; z-index: 10; width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: var(--dim); font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.tts-btn.on { color: #34d399; border-color: rgba(52,211,153,0.4); background: rgba(52,211,153,0.1); }
.tts-btn.off { color: #64748b; text-decoration: line-through; }
.tts-btn:active { transform: scale(0.92); }
.btn-mic { width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(255,255,255,0.06); color: #94a3b8; font-size: 1.3rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.btn-mic:active { background: rgba(239,68,68,0.3); color: #f87171; }
.btn-mic.recording { background: rgba(239,68,68,0.25); color: #f87171; animation: pulse-mic 1.2s ease-in-out infinite; }
@keyframes pulse-mic { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } }
.rec-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
.rec-overlay.active { display: flex; }
.rec-indicator { width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(239,68,68,0.8); display: flex; align-items: center; justify-content: center; animation: pulse-ring 1s ease-in-out infinite; }
@keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.7; } }
.rec-indicator.cancel { border-color: rgba(251,146,60,0.9); animation-name: pulse-ring-orange; }
@keyframes pulse-ring-orange { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.7; } }
.rec-dot { width: 18px; height: 18px; border-radius: 50%; background: #ef4444; transition: background 0.2s; }
.rec-dot.cancel { background: #fb923c; }
.rec-text { color: #e2e8f0; font-size: 0.9rem; max-width: 80%; text-align: center; min-height: 1.5em; }
.rec-hint { color: #94a3b8; font-size: 0.75rem; }
.rec-cancel-zone { position: absolute; bottom: 60px; background: rgba(251,146,60,0.15); border: 2px dashed rgba(251,146,60,0.4); border-radius: 16px; padding: 12px 24px; color: #fb923c; font-size: 0.85rem; transition: all 0.2s; }
.rec-cancel-zone.active { background: rgba(251,146,60,0.3); border-color: rgba(251,146,60,0.7); }
.debug-console { flex: 1; background: rgba(0,0,0,0.92); border-top: 1px solid rgba(255,255,255,0.1); font-family: 'Courier New', monospace; font-size: 0.7rem; display: flex; flex-direction: column; min-height: 0; }
.debug-console .dc-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
.dc-header span { color: #34d399; font-weight: 700; }
.dc-header button { background: none; border: none; color: #94a3b8; font-size: 0.85rem; cursor: pointer; padding: 2px 6px; }
.debug-console .dc-body { overflow-y: auto; padding: 8px 12px; flex: 1; user-select: none; -webkit-user-select: none; }
.dc-body::-webkit-scrollbar { width: 4px; }
.dc-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
.dc-body .dc-line { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); word-break: break-all; user-select: none; -webkit-user-select: none; }
.dc-line.log { color: #94a3b8; }
.dc-line.warn { color: #fbbf24; }
.dc-line.error { color: #f87171; }
.dc-line .dc-time { color: #64748b; margin-right: 6px; }
.genre-tags { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
.genre-tag { padding: 3px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: var(--dim); font-size: 0.7rem; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.genre-tag:active { transform: scale(0.95); }
.genre-tag.active { border-color: rgba(124,58,237,0.6); background: rgba(124,58,237,0.15); color: #a78bfa; }
.btn-export { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: var(--dim); font-size: 0.75rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.btn-export:active { color: var(--text); border-color: rgba(255,255,255,0.3); }
.input-counter { font-size: 0.6rem; color: var(--dim); text-align: right; padding: 2px 16px 0; opacity: 0.5; }
.bubble-actions { position: absolute; top: -10px; right: -6px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; z-index: 5; }
.msg .bubble { position: relative; }
.msg .bubble:hover .bubble-actions, .msg .bubble:active .bubble-actions, .msg .bubble.touched .bubble-actions { opacity: 1; }
.bubble-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: var(--dim); font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
.bubble-btn:active { background: rgba(255,255,255,0.25); color: var(--text); transform: scale(0.9); }
.bubble-btn.retry-btn { color: #fbbf24; }
.bubble-btn.retry-btn:active { background: rgba(251,191,36,0.2); }
.btn-undo { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: var(--dim); font-size: 0.8rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: color 0.15s, border-color 0.15s; }
.btn-undo:active { color: var(--text); border-color: rgba(255,255,255,0.3); }
.btn-undo:disabled { opacity: 0.3; cursor: not-allowed; }
.theme-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: var(--dim); font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.theme-btn:active { color: var(--text); border-color: rgba(255,255,255,0.3); }
.read-overlay { position: fixed; inset: 0; z-index: 90; background: var(--bg); display: none; flex-direction: column; padding: 20px; transition: background 0.3s; }
.read-overlay.active { display: flex; }
.read-overlay .read-content { flex: 1; overflow-y: auto; padding: 20px 0; font-size: 1.05rem; line-height: 2; white-space: pre-wrap; }
.read-overlay .read-controls { display: flex; gap: 10px; align-items: center; justify-content: center; padding: 16px 0; flex-shrink: 0; }
.read-overlay .read-speed { width: 120px; accent-color: var(--ai-color); }
.read-overlay .read-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: 0.85rem; cursor: pointer; font-family: inherit; }
.read-overlay .read-close { position: absolute; top: 16px; right: 20px; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.summary-panel { position: fixed; right: -300px; top: 60px; width: 260px; max-height: 60vh; z-index: 80; background: var(--bg); border: 1px solid var(--input-border); border-radius: 16px; padding: 16px; transition: right 0.3s; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.summary-panel.open { right: 16px; }
.summary-panel h4 { font-size: 0.85rem; margin-bottom: 8px; color: var(--ai-color); }
.summary-panel .summary-text { font-size: 0.75rem; line-height: 1.6; color: var(--dim); }
.summary-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: var(--dim); font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.story-archive { display: flex; gap: 4px; align-items: center; margin-top: 6px; justify-content: center; }
.story-archive select { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; color: var(--text); padding: 3px 8px; font-size: 0.7rem; font-family: inherit; max-width: 140px; }
.story-archive .archive-btn { padding: 3px 10px; border-radius: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--dim); font-size: 0.65rem; cursor: pointer; font-family: inherit; }
.branch-indicator { font-size: 0.55rem; color: #fbbf24; margin-left: 4px; }
.bubble-btn.variant-btn { color: #34d399; }
.bubble-btn.variant-btn:active { background: rgba(52,211,153,0.2); }
.bubble-btn.fork-btn { color: #fbbf24; }
.bubble-btn.fork-btn:active { background: rgba(251,191,36,0.2); }
.share-modal { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; }
.share-modal.active { display: flex; }
.share-modal .share-card { background: var(--bg); border-radius: 20px; padding: 20px; max-width: 320px; width: 90%; text-align: center; }
.share-modal canvas { width: 100%; border-radius: 12px; }
.share-modal .share-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
.share-modal .share-actions button { padding: 8px 16px; border-radius: 16px; border: none; background: linear-gradient(135deg, var(--user-color), var(--ai-color)); color: #fff; font-size: 0.8rem; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div class="starfield" id="starfield"></div>

<div style="text-align:center;position:relative;z-index:10;flex-shrink:0;padding:16px 20px 0;">
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
    <h1 style="font-size:clamp(1.2rem,3vw,1.6rem);font-weight:800;letter-spacing:0.04em;background:linear-gradient(135deg,#06b6d4,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0;">你一句，我一句 <span style="font-size:0.55rem;vertical-align:super;background:rgba(255,255,255,0.08);padding:1px 6px;border-radius:6px;color:#94a3b8;">V110</span></h1>
    <button class="tts-btn on" id="btnTTS" title="AI 朗读">♪</button>
    <button class="btn-export" id="btnExport" title="导出故事">↓</button>
    <button class="theme-btn" id="btnTheme" title="切换主题">◑</button>
    <button class="summary-btn" id="btnSummary" title="故事摘要">📋</button>
    <button class="read-btn" id="btnReadMode" title="阅读模式" style="width:auto;border-radius:16px;padding:3px 10px;font-size:0.65rem;border:1px solid var(--input-border);background:var(--input-bg);color:var(--dim);cursor:pointer;">阅读</button>
  </div>
  <div class="genre-tags" id="genreTags">
    <button class="genre-tag active" data-genre="">不限</button>
    <button class="genre-tag" data-genre="玄幻">玄幻</button>
    <button class="genre-tag" data-genre="科幻">科幻</button>
    <button class="genre-tag" data-genre="悬疑">悬疑</button>
    <button class="genre-tag" data-genre="日常">日常</button>
    <button class="genre-tag" data-genre="爱情">爱情</button>
  </div>
  <div class="story-archive" id="storyArchive">
    <select id="storySelect" onchange="switchStory(this.value)"><option value="__default__">默认故事</option></select>
    <button class="archive-btn" onclick="newStory()">+ 新建</button>
    <button class="archive-btn" onclick="deleteCurrentStory()" style="color:#f87171;">删</button>
  </div>
</div>

<div class="chat-wrap" id="chatWrap">
  <div class="msg system">
    <div class="bubble">请在下方输入一个故事的开头场景，<br>AI 会接着你的设定往下编。</div>
  </div>
</div>

<div class="summary-panel" id="summaryPanel">
  <h4>故事摘要</h4>
  <div class="summary-text" id="summaryText">暂无内容</div>
</div>
<div class="read-overlay" id="readOverlay">
  <button class="read-close" id="readClose">✕</button>
  <div class="read-content" id="readContent"></div>
  <div class="read-controls">
    <button class="read-btn" id="readPlay">播放</button>
    <span style="font-size:0.7rem;color:var(--dim);">速度</span>
    <input type="range" class="read-speed" id="readSpeed" min="1" max="10" value="3">
    <span id="readSpeedLabel" style="font-size:0.7rem;color:var(--dim);">3</span>
  </div>
</div>
<div class="share-modal" id="shareModal">
  <div class="share-card">
    <canvas id="shareCanvas" width="600" height="400"></canvas>
    <div class="share-actions">
      <button id="shareDownload">保存图片</button>
      <button id="shareClose">关闭</button>
    </div>
  </div>
</div>

<div class="bottom-panel">
<div class="input-bar">
  <button class="btn-reset" id="btnReset" title="重新开始">↺</button>
  <button class="btn-undo" id="btnUndo" title="撤回" disabled>↩</button>
  <button class="btn-mic" id="btnMic" title="语音输入">🎤</button>
  <textarea id="txtInput" rows="1" maxlength="500"></textarea>
  <button class="btn-send" id="btnSend">↑</button>
</div>
<div class="input-counter" id="inputCounter">0/500</div>
<div class="rec-overlay" id="recOverlay">
  <div class="rec-indicator" id="recIndicator"><div class="rec-dot" id="recDot"></div></div>
  <div class="rec-text" id="recText"></div>
  <div class="rec-hint">松开发送</div>
</div>
<div class="debug-console" id="debugConsole" style="display:none">
  <div class="dc-header"><span>DEBUG</span><button id="dcClear" title="清空">✕</button></div>
  <div class="dc-body" id="dcBody"></div>
</div>

<script>
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
(function initStarfield() {
  const sf = document.getElementById('starfield');
  const blobs = [{ x:15, y:20, w:200, h:200, c:'rgba(124,58,237,0.12)', dx:'30px', dy:'-20px', dur:'12s' },{ x:70, y:50, w:250, h:250, c:'rgba(6,182,212,0.10)', dx:'-25px', dy:'15px', dur:'14s' },{ x:40, y:70, w:180, h:180, c:'rgba(168,85,247,0.09)', dx:'20px', dy:'-15px', dur:'16s' }];
  blobs.forEach(b => { const el = document.createElement('div'); el.className = 'nebula-blob'; el.style.cssText = `left:${b.x}%;top:${b.y}%;width:${b.w}px;height:${b.h}px;background:${b.c};--dx:${b.dx};--dy:${b.dy};--drift:${b.dur};`; sf.appendChild(el); });
  for (let i = 0; i < 120; i++) { const s = document.createElement('div'); s.className = 'star'; const size = Math.random() * 2.5 + 0.5; const hue = [240, 200, 280, 180, 40][Math.floor(Math.random() * 5)]; s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;background:hsl(${hue},60%,75%);--dur:${Math.random()*3+2}s;--delay:${Math.random()*5}s;`; sf.appendChild(s); }
  for (let i = 0; i < 3; i++) { const sh = document.createElement('div'); sh.className = 'shooting'; sh.style.cssText = `left:${Math.random()*70+20}%;top:${Math.random()*40}%;--shoot-dur:${Math.random()*4+4}s;--shoot-delay:${Math.random()*8}s;`; sf.appendChild(sh); }
})();

const chatWrap = document.getElementById('chatWrap');
const txtInput = document.getElementById('txtInput');

async function speakViaDoubao(text) {

      method: 'POST',

      const audio = new Audio(audioUrl);
      currentSpeechAudio = audio;
      audio.onended = () => { URL.revokeObjectURL(audioUrl); currentSpeechAudio = null; resolve(); };

function base64ToBlob(base64, mime) {
  const byteChars = atob(base64);
  const byteNums = new Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
  const byteArray = new Uint8Array(byteNums);
  return new Blob([byteArray], { type: mime });

  if (!st) return;
  st.messages = messages.slice();
  st.genre = currentGenre;
}
function newStory() {
  saveCurrentStory();
  var id = 'story_' + Date.now();
  storyData.stories[id] = {title:'新故事', messages:[], genre:'', createdAt:Date.now()};
  storyData.activeId = id;
  messages = []; currentGenre = '';
  chatWrap.innerHTML = '<div class="msg system"><div class="bubble">请在下方输入一个故事的开头场景，<br>AI 会接着你的设定往下编。</div></div>';
  saveStories();
  refreshStorySelect();
  updateGenreTags();
  updateUndoButton();
  updateCharCounter();
}
function deleteCurrentStory() {
  var ids = Object.keys(storyData.stories);
  if (ids.length <= 1) return;
  if (!confirm('确定删除「'+(getActiveStory().title||'未命名')+'」？此操作不可恢复。')) return;
  saveCurrentStory();
  delete storyData.stories[storyData.activeId];
  storyData.activeId = Object.keys(storyData.stories)[0];
  var st = getActiveStory();
  messages = (st.messages||[]).slice();
  currentGenre = st.genre || '';
  renderAllMessages();
  saveStories();
  refreshStorySelect();
  updateGenreTags();
  updateUndoButton();
}
function renderAllMessages() {
  chatWrap.innerHTML = '';
  if (messages.length === 0) {
    chatWrap.innerHTML = '<div class="msg system"><div class="bubble">请在下方输入一个故事的开头场景，<br>AI 会接着你的设定往下编。</div></div>';
  } else {
    for (var i = 0; i < messages.length; i++) { addMsg(messages[i].role, messages[i].text); }
  }
}
function autoSaveOnAIResponse() {
  var st = getActiveStory();
  st.messages = messages.slice();
  st.genre = currentGenre;
  if (messages.length > 0 && (!st.title || st.title === '新故事' || st.title === '默认故事')) {
    var firstUser = null;
    for (var i = 0; i < messages.length; i++) { if (messages[i].role === 'user') { firstUser = messages[i].text; break; } }
    if (firstUser && firstUser.length > 0) { st.title = firstUser.slice(0, 20); }
  }
  saveStories();
  refreshStorySelect();
}
function updateGenreTags() {
  var tags = document.querySelectorAll('.genre-tag');
  for (var i = 0; i < tags.length; i++) {
    var tag = tags[i];
    tag.classList.toggle('active', tag.dataset.genre === currentGenre);
  }
}
loadStories();
refreshStorySelect();

// === Variant Regeneration & Branch Fork - modify addMsg to include buttons ===
var _origAddMsg = addMsg;
addMsg = function(role, text) {
  var div = _origAddMsg(role, text);
  if (role === 'ai') {
    var acts = div.querySelector('.bubble-actions');
    if (acts) {
      acts.innerHTML += '<button class="bubble-btn variant-btn" title="换一种写法" onclick="retryVariant(this)">⇄</button>';
      acts.innerHTML += '<button class="bubble-btn fork-btn" title="从这里分叉" onclick="forkFromHere(this)">⑂</button>';
    }
  }
  return div;
};
function retryVariant(btn) {
  if (isGenerating) return;
  var msgDiv = btn.closest('.msg'); if (!msgDiv) return;
  var allMsgs = Array.from(chatWrap.querySelectorAll('.msg'));
  var idx = allMsgs.indexOf(msgDiv);
  if (idx <= 0) return;
  var prevMsg = allMsgs[idx - 1];
  if (!prevMsg.classList.contains('user')) return;
  var userText = prevMsg.querySelector('.msg-text').textContent;
  var aiIdx = messages.length - (allMsgs.length - idx);
  var userIdx = aiIdx - 1;
  if (userIdx < 0 || messages[userIdx].role !== 'user' || messages[aiIdx].role !== 'ai') return;
  messages.splice(userIdx, 2);
  prevMsg.remove(); msgDiv.remove();
  updateUndoButton();
  isGenerating = true; btnSend.disabled = true; txtInput.disabled = true;
  var streamEl = createStreamBubble();
  var fullReply = '';
  (async () => {
    var variantPrompt = '请用完全不同的角度和风格重新续写，保持1-3句话的长度。\n\n对话历史:\n'+buildContext()+'\n\n玩家: '+userText+'\n\nAI:';
    var ctx = buildContext();
    var sysP = getSystemPrompt();
    var fullP = sysP + '\n\n对话历史:\n'+ctx+'\n\n玩家: '+userText+'\n\nAI（用不同风格续写，1-3句）:';
    try {
      var controller = new AbortController();
      var timer = setTimeout(function() { controller.abort(); }, API_CONFIG.timeout_ms);
      var resp = await fetch(API_CONFIG.url, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_CONFIG.api_key},
        body:JSON.stringify({model:API_CONFIG.model, messages:[{role:'user',content:fullP}], temperature:0.95, max_tokens:API_CONFIG.max_tokens, stream:true}),
        signal:controller.signal
      });
      clearTimeout(timer);
      if (!resp.ok) throw new Error('HTTP '+resp.status);
      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';
      while (true) {
        var _a = await reader.read(), done = _a.done, value = _a.value;
        if (done) break;
        buffer += decoder.decode(value, {stream:true});
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (var li = 0; li < lines.length; li++) {
          var s = lines[li].trim();
          if (!s.startsWith('data: ')) continue;
          var payload = s.slice(6);
          if (payload === '[DONE]') break;
          try { var c = JSON.parse(payload).choices?.[0]?.delta?.content; if (c) { fullReply += c; streamEl.textContent = fullReply.replace(/^(AI接龙|AI[：:]|接龙[：:])\s*/i,''); scrollBottom(); } } catch(e) {}
        }
      }
    } catch(e) { fullReply = '（生成变体失败，请重试）'; }
    fullReply = fullReply.replace(/^(AI接龙|AI[：:]|接龙[：:])\s*/i,'').trim();
    if (!fullReply) fullReply = '（AI 陷入了短暂的沉默……）';
    finishStreamBubble(streamEl);
    streamEl.textContent = fullReply;
    messages.push({role:'ai', text:fullReply});
    isGenerating = false; btnSend.disabled = false; txtInput.disabled = false;
    updateUndoButton();
    autoSaveOnAIResponse();
  })();
}
function forkFromHere(btn) {
  if (isGenerating) return;
  var msgDiv = btn.closest('.msg'); if (!msgDiv) return;
  var allMsgs = Array.from(chatWrap.querySelectorAll('.msg'));
  var idx = allMsgs.indexOf(msgDiv);
  if (idx <= 0) return;
  var aiIdx = messages.length - (allMsgs.length - idx);
  if (aiIdx < 0 || messages[aiIdx].role !== 'ai') return;
  saveCurrentStory();
  var forkId = 'story_' + Date.now();
  var forkMsgs = messages.slice(0, aiIdx + 1);
  var forkTitle = '';
  for (var i = 0; i < forkMsgs.length; i++) { if (forkMsgs[i].role === 'user') { forkTitle = forkMsgs[i].text.slice(0,20); break; } }
  storyData.stories[forkId] = {title:'分支: '+forkTitle, messages:forkMsgs, genre:currentGenre, createdAt:Date.now()};
  storyData.activeId = forkId;
  messages = forkMsgs.slice();
  renderAllMessages();
  saveStories();
  refreshStorySelect();
  updateGenreTags();
  updateUndoButton();
  chatWrap.insertAdjacentHTML('beforeend', '<div class="msg system"><div class="bubble">已从该处分叉，原故事保留在存档中</div></div>');
  scrollBottom();
}

// === Reading Mode ===
var readTimer = null, readPaused = true;
document.getElementById('btnReadMode').addEventListener('click', function() {
  var overlay = document.getElementById('readOverlay');
  var content = document.getElementById('readContent');
  var txt = '';
  for (var i = 0; i < messages.length; i++) {
    txt += (messages[i].role === 'user' ? '【你】' : '【AI】') + ' ' + messages[i].text + '\n\n';
  }
  if (!txt) txt = '还没有故事内容，请先开始创作。';
  content.textContent = txt;
  content.scrollTop = 0;
  overlay.classList.add('active');
  readPaused = true;
  document.getElementById('readPlay').textContent = '播放';
});
document.getElementById('readClose').addEventListener('click', function() {
  document.getElementById('readOverlay').classList.remove('active');
  if (readTimer) clearInterval(readTimer);
});
document.getElementById('readPlay').addEventListener('click', function() {
  var btn = document.getElementById('readPlay');
  var content = document.getElementById('readContent');
  if (!readPaused) { readPaused = true; btn.textContent = '播放'; if (readTimer) clearInterval(readTimer); return; }
  readPaused = false; btn.textContent = '暂停';
  var speed = parseInt(document.getElementById('readSpeed').value) || 3;
  readTimer = setInterval(function() {
    if (readPaused) return;
    if (content.scrollTop + content.clientHeight >= content.scrollHeight) {
      clearInterval(readTimer);
      readPaused = true; btn.textContent = '播放';
      return;
    }
    content.scrollTop += speed;
  }, 100);
});
document.getElementById('readSpeed').addEventListener('input', function() {
  document.getElementById('readSpeedLabel').textContent = this.value;
});

// === Summary Panel ===
document.getElementById('btnSummary').addEventListener('click', function() {
  var panel = document.getElementById('summaryPanel');
  var txt = document.getElementById('summaryText');
  if (messages.length === 0) { txt.textContent = '暂无故事内容'; }
  else {
    var summary = '';
    var recent = messages.slice(-6);
    for (var i = 0; i < recent.length; i++) {
      var prefix = recent[i].role === 'user' ? '你：' : 'AI：';
      var t = recent[i].text.length > 60 ? recent[i].text.slice(0,60)+'…' : recent[i].text;
      summary += prefix + t + '\n\n';
    }
    txt.textContent = summary || '暂无内容';
  }
  panel.classList.toggle('open');
});

// === Share Card ===
function generateShareCard() {
  if (messages.length === 0) return;
  var modal = document.getElementById('shareModal');
  var canvas = document.getElementById('shareCanvas');
  var ctx = canvas.getContext('2d');
  var isLight = document.body.classList.contains('light');
  var bg = ctx.createLinearGradient(0, 0, 600, 400);
  if (isLight) { bg.addColorStop(0, '#e0e7ff'); bg.addColorStop(1, '#cffafe'); }
  else { bg.addColorStop(0, '#0a0a14'); bg.addColorStop(1, '#1a1040'); }
  ctx.fillStyle = bg; ctx.fillRect(0, 0, 600, 400);
  ctx.fillStyle = isLight ? '#1e293b' : '#e2e8f0';
  ctx.font = 'bold 24px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  var title = getActiveStory().title || '故事接龙';
  ctx.fillText(title, 300, 50);
  ctx.font = '14px -apple-system, sans-serif';
  ctx.fillStyle = isLight ? '#64748b' : '#94a3b8';
  var excerpt = '';
  for (var i = 0; i < messages.length && excerpt.length < 200; i++) {
    excerpt += (messages[i].role==='user'?'你: ':'AI: ') + messages[i].text.slice(0,80) + '\n';
  }
  var lines = excerpt.split('\n');
  ctx.font = '13px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  for (var j = 0; j < lines.length && j < 12; j++) {
    ctx.fillText(lines[j].slice(0, 55), 40, 90 + j * 24);
  }
  ctx.fillStyle = isLight ? '#94a3b8' : '#64748b';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('你一句，我一句 — 故事接龙', 300, 380);
  modal.classList.add('active');

  document.getElementById('shareDownload').onclick = function() {
    var link = document.createElement('a');
    link.download = 'story_share.png';
    link.href = canvas.toDataURL();
    link.click();
  };
  document.getElementById('shareClose').onclick = function() { modal.classList.remove('active'); };
}
// Share on export button long-press or when summary opens with content
var exportBtn = document.getElementById('btnExport');
exportBtn.addEventListener('contextmenu', function(e) { e.preventDefault(); if (messages.length > 0) generateShareCard(); });

// Auto-save: hook into handleSend + observer
(function() {
  // Hook btnSend click
  btnSend.addEventListener('click', async function() {
    if (isGenerating) return;
    // Will auto-save via observer below
  });
  // MutationObserver detects AI reply completion
  var observer = new MutationObserver(function() {
    if (!isGenerating && messages.length > 0) autoSaveOnAIResponse();
  });
  observer.observe(chatWrap, {childList: true, subtree: true});
})();

// Touch support for bubble actions on mobile
chatWrap.addEventListener('touchstart', function(e) {
  var bubble = e.target.closest('.bubble');
  if (!bubble) { document.querySelectorAll('.bubble.touched').forEach(function(b){b.classList.remove('touched');}); return; }
  var wasTouched = bubble.classList.contains('touched');
  document.querySelectorAll('.bubble.touched').forEach(function(b){b.classList.remove('touched');});
  if (!wasTouched) { bubble.classList.add('touched'); e.preventDefault(); }
}, {passive: false});

// Initial auto-save after loading
autoSaveOnAIResponse();
</script>
