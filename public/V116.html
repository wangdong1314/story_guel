<script>
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
(function initStarfield() {
  const sf = document.getElementById('starfield');
  const blobs = [{ x:15, y:20, w:200, h:200, c:'rgba(124,58,237,0.12)', dx:'30px', dy:'-20px', dur:'12s' },{ x:70, y:50, w:250, h:250, c:'rgba(6,182,212,0.10)', dx:'-25px', dy:'15px', dur:'14s' },{ x:40, y:70, w:180, h:180, c:'rgba(168,85,247,0.09)', dx:'20px', dy:'-15px', dur:'16s' }];
  blobs.forEach(b => { const el = document.createElement('div'); el.className = 'nebula-blob'; el.style.cssText = `left:${b.x}%;top:${b.y}%;width:${b.w}px;height:${b.h}px;background:${b.c};--dx:${b.dx};--dy:${b.dy};--drift:${b.dur};`; sf.appendChild(el); });
  for (let i = 0; i < 120; i++) { const s = document.createElement('div'); s.className = 'star'; const size = Math.random() * 2.5 + 0.5; const hue = [240, 200, 280, 180, 40][Math.floor(Math.random() * 5)]; s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;background:hsl(${hue},60%,75%);--dur:${Math.random()*3+2}s;--delay:${Math.random()*5}s;`; sf.appendChild(s); }
  for (let i = 0; i < 3; i++) { const sh = document.createElement('div'); sh.className = 'shooting'; sh.style.cssText = `left:${Math.random()*70+20}%;top:${Math.random()*40}%;--shoot-dur:${Math.random()*4+4}s;--shoot-delay:${Math.random()*8}s;`; sf.appendChild(sh); }
})();

const chatWrap = document.getElementById('chatWrap');
const txtInput = document.getElementById('txtInput');
const btnSend = document.getElementById('btnSend');
const btnReset = document.getElementById('btnReset');
const btnTTS = document.getElementById('btnTTS');
let messages = [];
let isGenerating = false;
let ttsEnabled = true;
let currentUtterance = null;

function scrollBottom() { requestAnimationFrame(() => { chatWrap.scrollTop = chatWrap.scrollHeight; }); }
function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(function(){});
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  }
}
function addMsg(role, text) { const div = document.createElement('div'); div.className = 'msg ' + role; const avatarChar = role === 'ai' ? 'AI' : '你'; const roleLabel = role === 'ai' ? 'AI 接龙' : '你的回合'; const cleanText = text.replace(/<[^>]*>/g, ''); const actionsHtml = role === 'ai' ? '<div class="ai-side"><button class="bubble-undo" title="撤回" onclick="event.stopPropagation();bubbleUndo(this)">↩</button><div class="bubble-actions"><button class="bubble-btn copy-btn" title="复制" onclick="event.stopPropagation();copyBubble(this)">⎘</button><button class="bubble-btn retry-btn" title="重试" onclick="event.stopPropagation();retryAI(this)">↻</button><button class="bubble-btn variant-btn" title="换一种写法" onclick="event.stopPropagation();retryVariant(this)">⇄</button><button class="bubble-btn fork-btn" title="从这里分叉" onclick="event.stopPropagation();forkFromHere(this)">⑂</button></div></div>' : '<div class="bubble-actions" style="position:absolute;top:4px;right:4px;display:none;"><button class="bubble-btn copy-btn" title="复制" onclick="event.stopPropagation();copyBubble(this)">⎘</button></div>'; div.innerHTML = '<div class="avatar">'+avatarChar+'</div><div class="bubble">'+actionsHtml+'<div class="role-tag">'+roleLabel+' <span class="char-count">'+cleanText.length+'字</span></div><div class="msg-text">'+text+'</div></div>'; chatWrap.appendChild(div); scrollBottom(); return div; }
function createStreamBubble() { const div = document.createElement('div'); div.className = 'msg ai'; div.id = 'streamBubble'; div.innerHTML = '<div class="avatar">AI</div><div class="bubble"><div class="role-tag">AI 接龙 <span class="char-count" id="streamCharCount">0字</span></div><div class="msg-text stream-cursor"></div></div>'; chatWrap.appendChild(div); scrollBottom(); return div.querySelector('.msg-text'); }
function finishStreamBubble(el) { el.classList.remove('stream-cursor'); const bubble = document.getElementById('streamBubble'); if (bubble) bubble.removeAttribute('id'); }

let currentGenre = '';
function getSystemPrompt() { let base = '你是一个创意故事接龙助手。规则：\n1. 每次续写 1-3 句话，给用户留接话空间。\n2. 保持风格一致。\n3. 结尾留悬念或转折。\n4. 直接输出故事，不要说任何废话。'; if (currentGenre) base += '\n5. 故事风格限定为「'+currentGenre+'」，所有续写必须严格符合该题材。'; return base; }
function copyBubble(btn) { const bubble = btn.closest('.bubble'); const textEl = bubble.querySelector('.msg-text'); const text = textEl ? textEl.textContent : ''; navigator.clipboard.writeText(text).then(() => { btn.textContent = '✓'; setTimeout(() => { btn.textContent = '⎘'; }, 1200); }).catch(() => { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); btn.textContent = '✓'; setTimeout(() => { btn.textContent = '⎘'; }, 1200); }); }
function retryAI(btn) { if (isGenerating) return; const msgDiv = btn.closest('.msg'); if (!msgDiv) return; const allMsgs = Array.from(chatWrap.querySelectorAll('.msg')); const idx = allMsgs.indexOf(msgDiv); if (idx <= 0) return; const prevMsg = allMsgs[idx - 1]; if (!prevMsg.classList.contains('user')) return; const userText = prevMsg.querySelector('.msg-text').textContent; const aiIdx = messages.length - (allMsgs.length - idx); const userIdx = aiIdx - 1; if (userIdx < 0 || messages[userIdx].role !== 'user' || messages[aiIdx].role !== 'ai') return; messages.splice(userIdx, 2); prevMsg.remove(); msgDiv.remove(); updateBubbleUndo(); isGenerating = true; btnSend.disabled = true; txtInput.disabled = true; const streamEl = createStreamBubble(); let fullReply = ''; let lastSpokenLen = 0; const sentenceBreakers = /[。！？；…\n]/; (async () => { for await (const chunk of streamAI(userText)) { fullReply += chunk; const clean = fullReply.replace(/^(AI接龙|AI[：:]|接龙[：:])\s*/i,''); streamEl.textContent = clean; const ccEl = document.getElementById('streamCharCount'); if (ccEl) ccEl.textContent = clean.length+'字'; scrollBottom(); while (true) { const idx2 = clean.slice(lastSpokenLen).search(sentenceBreakers); if (idx2 === -1) break; const sentence = clean.slice(lastSpokenLen, lastSpokenLen + idx2 + 1).trim(); lastSpokenLen += idx2 + 1; if (sentence) enqueueSpeech(sentence); } } fullReply = fullReply.replace(/^(AI接龙|AI[：:]|接龙[：:])\s*/i,'').trim(); if (!fullReply) fullReply = '（AI 陷入了短暂的沉默……）'; const tail = fullReply.slice(lastSpokenLen).trim(); if (tail) enqueueSpeech(tail); finishStreamBubble(streamEl); streamEl.textContent = fullReply; const streamDiv2 = streamEl.closest('.msg'); if (streamDiv2) streamDiv2.remove(); addMsg('ai', fullReply); messages.push({role:'ai',text:fullReply}); isGenerating = false; btnSend.disabled = false; txtInput.disabled = false; updateBubbleUndo(); })(); }
function exportStory() { if (messages.length === 0) { console.log('[export] 无消息，跳过'); return; } try { let txt = '你一句，我一句 — 故事接龙\n' + new Date().toLocaleString() + '\n' + '='.repeat(40) + '\n\n'; for (const m of messages) { txt += (m.role === 'user' ? '【你的回合】\n' : '【AI 接龙】\n') + m.text + '\n\n'; } const blob = new Blob(['\uFEFF'+txt], {type:'text/plain;charset=utf-8'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'story_'+new Date().toISOString().slice(0,10)+'.txt'; a.click(); URL.revokeObjectURL(url); console.log('[export] 导出成功，消息数:', messages.length); } catch(e) { console.error('[export] 失败:', e.message); } }
function updateBubbleUndo() { var allMsgs = Array.from(chatWrap.querySelectorAll('.msg:not(.system)')); var lastAi = null; if (allMsgs.length >= 2 && allMsgs[allMsgs.length-1].classList.contains('ai')) lastAi = allMsgs[allMsgs.length-1]; document.querySelectorAll('.msg.ai .bubble-undo').forEach(function(b){b.style.display = (b.closest('.msg') === lastAi) ? '' : 'none';}); }
function bubbleUndo(btn) { if (isGenerating) return; var msgDiv = btn.closest('.msg'); if (!msgDiv) return; var allMsgs = Array.from(chatWrap.querySelectorAll('.msg')); var idx = allMsgs.indexOf(msgDiv); if (idx <= 0) return; var prevMsg = allMsgs[idx - 1]; if (!prevMsg.classList.contains('user')) return; var nonSys = chatWrap.querySelectorAll('.msg:not(.system)'); if (nonSys.length < 2 || nonSys[nonSys.length-1] !== msgDiv) return; messages.pop(); messages.pop(); prevMsg.remove(); msgDiv.remove(); updateBubbleUndo(); scrollBottom(); }

let bestVoice = null;
function getBestVoice() { if (bestVoice) return bestVoice; const voices = speechSynthesis.getVoices(); const prefer = voices.find(v => v.name.includes('Google') && v.lang.startsWith('zh')) || voices.find(v => v.lang === 'zh-CN') || voices.find(v => v.lang.startsWith('zh')) || voices[0]; bestVoice = prefer; return bestVoice; }
/* ---- 豆包语音合成（EdgeOne 边缘函数） ---- */
let ttsCookieReady = false;
let currentAudio = null;
const TTS_BASE = 'https://speachsynthesis-zgjkgthi.edgeone.cool/api/tts';
const TTS_TOKEN_PARAMS = 'eo_token=4779d1abceae8b189a9c4786b4df249c&eo_time=1780303017';
async function ensureTtsCookie() {
  if (ttsCookieReady) return;
  try {
    const img = new Image();
    img.src = TTS_BASE + '?' + TTS_TOKEN_PARAMS;
    await new Promise((resolve) => {
      img.onload = resolve;
      img.onerror = resolve;
      setTimeout(resolve, 100);
    });
    ttsCookieReady = true;
    console.log('TTS cookie 已建立');
  } catch (e) {
    console.warn('TTS cookie 建立失败:', e.message);
  }
}
function base64ToBlob(base64, mime) {
  const byteChars = atob(base64);
  const byteNums = new Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
  const byteArray = new Uint8Array(byteNums);
  return new Blob([byteArray], { type: mime });
}
function playDoubaoAudio(b64data, resolve) {
  const blob = base64ToBlob(b64data, 'audio/mp3');
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);
  currentAudio = audio;
  audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; if (resolve) resolve(); };
  audio.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; if (resolve) resolve(); };
  audio.play().catch(() => { if (resolve) resolve(); });
}

async function speakViaDoubao(text) {
  // 方案A：直接POST到带token的URL（不依赖Cookie，适配本地文件）
  try {
    const resp = await fetch(TTS_BASE + '?' + TTS_TOKEN_PARAMS, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (resp.ok) {
      const data = await resp.json();
      console.log('豆包TTS[直连] 响应:', data.code);
      if (data.code === 3000) {
        return new Promise((resolve) => { playDoubaoAudio(data.data, resolve); });
      }
    }
    console.warn('豆包TTS[直连] 状态异常:', resp.status);
  } catch (e) {
    console.warn('豆包TTS[直连] 失败:', e.message);
  }
  // 方案B：Cookie预热后请求
  await ensureTtsCookie();
  try {
    const resp = await fetch(TTS_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ text })
    });
    console.log('豆包TTS[Cookie] HTTP:', resp.status);
    const data = await resp.json();
    console.log('豆包TTS[Cookie] 响应:', data.code, data.message||'');
    if (data.code !== 3000) throw new Error(data.message || 'TTS failed');
    return new Promise((resolve) => { playDoubaoAudio(data.data, resolve); });
  } catch (e) {
    console.warn('豆包TTS[Cookie] 失败:', e.message, '| 降级原生');
    return speakViaNative(text);
  }
}

function speakViaNative(text) { return new Promise((resolve) => { const utterance = new SpeechSynthesisUtterance(text); const voice = getBestVoice(); if (voice) utterance.voice = voice; utterance.lang = 'zh-CN'; utterance.rate = 0.9; utterance.pitch = 1.0; utterance.volume = 0.95; currentUtterance = utterance; utterance.onend = () => { console.log('原生TTS 完成'); resolve(); }; utterance.onerror = () => { console.warn('原生TTS 错误'); resolve(); }; speechSynthesis.speak(utterance); }); }
let speakFunction = speakViaDoubao;

const SENTENCE_DELIMITERS = /[。！？；…\n]+/;
function splitSentences(text) { const raw = text.split(SENTENCE_DELIMITERS); const sentences = []; for (let s of raw) { if (!s.trim()) continue; while (s.length > 150) { const splitAt = s.lastIndexOf(' ', 150); if (splitAt === -1) { sentences.push(s.slice(0, 150)); s = s.slice(150); } else { sentences.push(s.slice(0, splitAt)); s = s.slice(splitAt); } } sentences.push(s.trim()); } return sentences; }

let speechQueue = [];
let speechRunning = false;
async function processSpeechQueue() { if (speechRunning) return; speechRunning = true; try { while (speechQueue.length > 0) { if (!ttsEnabled) break; const text = speechQueue.shift(); await speakFunction(text); } } finally { speechRunning = false; } }
function enqueueSpeech(text) { if (!ttsEnabled || !text) return; const clean = text.trim(); if (!clean) return; speechQueue.push(clean); processSpeechQueue(); }

  var html = '';

  while (item && !item.classList.contains('story-dd-item')) { item = item.parentElement; }
  if (!item) return;
  var action = item.getAttribute('data-action');
  if (!action) { action = el.getAttribute('data-action'); }
  var sid = item.getAttribute('data-sid');
  if (action === 'new') { document.getElementById('storyDropdown').classList.remove('open'); newStory(); return; }
  if (!sid) return;

  console.log('[deleteStory] 准备删除:', id, st.title);

  var prevMsg = allMsgs[idx - 1];
  if (!prevMsg.classList.contains('user')) return;
  var userText = prevMsg.querySelector('.msg-text').textContent;
  var aiIdx = messages.length - (allMsgs.length - idx);
  var userIdx = aiIdx - 1;
  if (userIdx < 0 || messages[userIdx].role !== 'user' || messages[aiIdx].role !== 'ai') return;
  messages.splice(userIdx, 2);
  prevMsg.remove(); msgDiv.remove();
  updateBubbleUndo();
  isGenerating = true; btnSend.disabled = true; txtInput.disabled = true;
  var streamEl = createStreamBubble();
  var fullReply = '';
  (async () => {
    var variantPrompt = '请用完全不同的角度和风格重新续写，保持1-3句话的长度。\n\n对话历史:\n'+buildContext()+'\n\n玩家: '+userText+'\n\nAI:';
    var ctx = buildContext();
    var sysP = getSystemPrompt();
    var fullP = sysP + '\n\n对话历史:\n'+ctx+'\n\n玩家: '+userText+'\n\nAI（用不同风格续写，1-3句）:';
    try {
      var controller = new AbortController();
      var timer = setTimeout(function() { controller.abort(); }, API_CONFIG.timeout_ms);
      var resp = await fetch(API_CONFIG.url, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_CONFIG.api_key},
        body:JSON.stringify({model:API_CONFIG.model, messages:[{role:'user',content:fullP}], temperature:0.95, max_tokens:API_CONFIG.max_tokens, stream:true}),
        signal:controller.signal
      });
      clearTimeout(timer);
      if (!resp.ok) throw new Error('HTTP '+resp.status);
      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';
      while (true) {
        var _a = await reader.read(), done = _a.done, value = _a.value;
        if (done) break;
        buffer += decoder.decode(value, {stream:true});
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (var li = 0; li < lines.length; li++) {
          var s = lines[li].trim();
          if (!s.startsWith('data: ')) continue;
          var payload = s.slice(6);
          if (payload === '[DONE]') break;
          try { var c = JSON.parse(payload).choices?.[0]?.delta?.content; if (c) { fullReply += c; streamEl.textContent = fullReply.replace(/^(AI接龙|AI[：:]|接龙[：:])\s*/i,''); scrollBottom(); } } catch(e) {}
        }
      }
    } catch(e) { fullReply = '（生成变体失败，请重试）'; }
    fullReply = fullReply.replace(/^(AI接龙|AI[：:]|接龙[：:])\s*/i,'').trim();
    if (!fullReply) fullReply = '（AI 陷入了短暂的沉默……）';
    finishStreamBubble(streamEl);
    streamEl.textContent = fullReply;
    var streamDiv3 = streamEl.closest('.msg'); if (streamDiv3) streamDiv3.remove();
    addMsg('ai', fullReply);
    messages.push({role:'ai', text:fullReply});
    isGenerating = false; btnSend.disabled = false; txtInput.disabled = false;
    updateBubbleUndo();
    autoSaveOnAIResponse();
  })();
}
function forkFromHere(btn) {
  if (isGenerating) return;
  var msgDiv = btn.closest('.msg'); if (!msgDiv) return;
  var allMsgs = Array.from(chatWrap.querySelectorAll('.msg'));
  var idx = allMsgs.indexOf(msgDiv);
  if (idx <= 0) return;
  var aiIdx = messages.length - (allMsgs.length - idx);
  if (aiIdx < 0 || messages[aiIdx].role !== 'ai') return;
  saveCurrentStory();
  var forkId = 'story_' + Date.now();
  var forkMsgs = messages.slice(0, aiIdx + 1);
  var forkTitle = '';
  for (var i = 0; i < forkMsgs.length; i++) { if (forkMsgs[i].role === 'user') { forkTitle = forkMsgs[i].text.slice(0,20); break; } }
  storyData.stories[forkId] = {title:'分支: '+forkTitle, messages:forkMsgs, genre:currentGenre, createdAt:Date.now()};
  storyData.activeId = forkId;
  messages = forkMsgs.slice();
  renderAllMessages();
  saveStories();
  refreshStorySelect();
  updateGenreTags();
  updateBubbleUndo();
  chatWrap.insertAdjacentHTML('beforeend', '<div class="msg system"><div class="bubble">已从该处分叉，原故事保留在存档中</div></div>');
  scrollBottom();
}

// === Reading Mode ===
var readTimer = null, readPaused = true;
document.getElementById('btnReadMode').addEventListener('click', function() {
  var overlay = document.getElementById('readOverlay');
  var content = document.getElementById('readContent');
  var txt = '';
  for (var i = 0; i < messages.length; i++) {
    txt += (messages[i].role === 'user' ? '【你】' : '【AI】') + ' ' + messages[i].text + '\n\n';
  }
  if (!txt) txt = '还没有故事内容，请先开始创作。';
  content.textContent = txt;
  content.scrollTop = 0;
  overlay.classList.add('active');
  readPaused = true;
  document.getElementById('readPlay').textContent = '播放';
});
document.getElementById('readClose').addEventListener('click', function() {
  document.getElementById('readOverlay').classList.remove('active');
  if (readTimer) clearInterval(readTimer);
});
document.getElementById('readPlay').addEventListener('click', function() {
  var btn = document.getElementById('readPlay');
  var content = document.getElementById('readContent');
  if (!readPaused) { readPaused = true; btn.textContent = '播放'; if (readTimer) clearInterval(readTimer); return; }
  readPaused = false; btn.textContent = '暂停';
  var speed = parseInt(document.getElementById('readSpeed').value) || 3;
  readTimer = setInterval(function() {
    if (readPaused) return;
    if (content.scrollTop + content.clientHeight >= content.scrollHeight) {
      clearInterval(readTimer);
      readPaused = true; btn.textContent = '播放';
      return;
    }
    content.scrollTop += speed;
  }, 100);
});
document.getElementById('readSpeed').addEventListener('input', function() {
  document.getElementById('readSpeedLabel').textContent = this.value;
});

// === Summary Panel ===
document.getElementById('btnSummary').addEventListener('click', function(e) {
  e.stopPropagation();
  var panel = document.getElementById('summaryPanel');
  var txt = document.getElementById('summaryText');
  if (messages.length === 0) { txt.textContent = '暂无故事内容'; }
  else {
    var summary = '';
    var recent = messages.slice(-6);
    for (var i = 0; i < recent.length; i++) {
      var prefix = recent[i].role === 'user' ? '你：' : 'AI：';
      var t = recent[i].text.length > 60 ? recent[i].text.slice(0,60)+'…' : recent[i].text;
      summary += prefix + t + '\n\n';
    }
    txt.textContent = summary || '暂无内容';
  }
  panel.classList.toggle('open');
});
document.addEventListener('click', function(e) {
  var panel = document.getElementById('summaryPanel');
  if (!panel.classList.contains('open')) return;
  if (!panel.contains(e.target) && e.target.id !== 'btnSummary') {
    panel.classList.remove('open');
  }
});

// === Share Card ===
function generateShareCard() {
  if (messages.length === 0) return;
  var modal = document.getElementById('shareModal');
  var canvas = document.getElementById('shareCanvas');
  var ctx = canvas.getContext('2d');
  var isLight = document.body.classList.contains('light');
  var bg = ctx.createLinearGradient(0, 0, 600, 400);
  if (isLight) { bg.addColorStop(0, '#e0e7ff'); bg.addColorStop(1, '#cffafe'); }
  else { bg.addColorStop(0, '#0a0a14'); bg.addColorStop(1, '#1a1040'); }
  ctx.fillStyle = bg; ctx.fillRect(0, 0, 600, 400);
  ctx.fillStyle = isLight ? '#1e293b' : '#e2e8f0';
  ctx.font = 'bold 24px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  var title = getActiveStory().title || '故事接龙';
  ctx.fillText(title, 300, 50);
  ctx.font = '14px -apple-system, sans-serif';
  ctx.fillStyle = isLight ? '#64748b' : '#94a3b8';
  var excerpt = '';
  for (var i = 0; i < messages.length && excerpt.length < 200; i++) {
    excerpt += (messages[i].role==='user'?'你: ':'AI: ') + messages[i].text.slice(0,80) + '\n';
  }
  var lines = excerpt.split('\n');
  ctx.font = '13px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  for (var j = 0; j < lines.length && j < 12; j++) {
    ctx.fillText(lines[j].slice(0, 55), 40, 90 + j * 24);
  }
  ctx.fillStyle = isLight ? '#94a3b8' : '#64748b';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('你一句，我一句 — 故事接龙', 300, 380);
  modal.classList.add('active');

  document.getElementById('shareDownload').onclick = function() {
    var link = document.createElement('a');
    link.download = 'story_share.png';
    link.href = canvas.toDataURL();
    link.click();
  };
  document.getElementById('shareClose').onclick = function() { modal.classList.remove('active'); };
}
// Share on export button long-press or when summary opens with content
var exportBtn = document.getElementById('btnExport');
exportBtn.addEventListener('contextmenu', function(e) { e.preventDefault(); if (messages.length > 0) generateShareCard(); });

// Auto-save: hook into handleSend + observer
(function() {
  // Hook btnSend click
  btnSend.addEventListener('click', async function() {
    if (isGenerating) return;
    // Will auto-save via observer below
  });
  // MutationObserver detects AI reply completion
  var observer = new MutationObserver(function() {
    if (!isGenerating && messages.length > 0) autoSaveOnAIResponse();
  });
  observer.observe(chatWrap, {childList: true, subtree: true});
})();

// Tap vs scroll separation for bubble actions
var bubbleTapData = {};
chatWrap.addEventListener('pointerdown', function(e) {
  var bubble = e.target.closest('.msg.ai .bubble');
  if (!bubble) { hideAllBubbleActions(); return; }
  bubbleTapData = { msg: bubble.closest('.msg.ai'), startY: e.clientY, isScroll: false };
});
chatWrap.addEventListener('pointermove', function(e) {
  if (!bubbleTapData.msg) return;
  if (Math.abs(e.clientY - bubbleTapData.startY) > 10) bubbleTapData.isScroll = true;
});
chatWrap.addEventListener('pointerup', function(e) {
  if (!bubbleTapData.msg) return;
  var msg = bubbleTapData.msg;
  if (!bubbleTapData.isScroll) { hideAllBubbleActions(); msg.classList.toggle('show-actions'); e.preventDefault(); }
  bubbleTapData = {};
});
chatWrap.addEventListener('scroll', function() { hideAllBubbleActions(); });
function hideAllBubbleActions() { document.querySelectorAll('.msg.ai.show-actions').forEach(function(m){m.classList.remove('show-actions');}); }

// Initial auto-save after loading
autoSaveOnAIResponse();
</script>
